# Ly display manager configuration

# General
[general]
# Initial delay in milliseconds
initial_delay=0
# Minimum password length
min_password_len=4
# ASCII or box
ascii_only=0
# Show default username
show_default_username=1
# Default username
default_username=
# Remove power management commands
rm_power_commands=0
# Blank the password input
blank_password=0
# Language (en, fr, de, etc.)
lang=en

# Appearance
[appearance]
# Background color (hex)
background=282828
# Foreground color (hex)
foreground=ebdbb2
# Main color (hex)
main_color=ebdbb2
# Error color (hex)
error_color=cc241d
# Background command (empty for solid color)
background_cmd=

# Session
[session]
# Default session
default_session=sway
# List of sessions (comma-separated)
sessions=sway,wayland
