[main]
font=JetBrains Mono 11
dpi-aware=no
initial-window-size-pixels=1200x800
pad=20x20 center
selection-target=clipboard

[colors]
alpha=0.95
background=282828
foreground=ebdbb2
regular=282828 cc241d 98971a d79920 458588 b16286 689d6a a89984
bright=928374 fb4934 b8bb26 fabd2f 458588 d3869b 8ec07c ebdbb2
selection-foreground=282828
selection-background=ebdbb2
cursor=ebdbb2

[cursor]
style=beam
beam-thickness=2

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
label-foreground=282828
label-background=ebdbb2
label-size=14.0
uri-escapes=*+=:.url

[hints]
font=JetBrains Mono 12
alphabet=1234567890
foreground=282828
background=ebdbb2
padding=4

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
scrollback-up-line=Shift+Page_Up
scrollback-down-line=Shift+Page_Down
scrollback-to-beginning=Shift+Home
scrollback-to-end=Shift+End
copy-mode=Control+Shift+c
paste=Control+Shift+v
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
search-start=Control+Shift+f

[search-bindings]
cancel=Control+g Escape
find-prev=Control+r
find-next=Control+s Control+g
line-wrap=Control+w

[mute]
bell=none
